services:
  vmagent-ui:
    image: ${IMAGE_REPO}:${IMAGE_TAG}
    container_name: vmagent-ui
    restart: unless-stopped

    ports:
      - "${APP_PORT}:3099"

    environment:
      HOST: 0.0.0.0
      PORT: 3099

      MYSQL_DSN: ${MYSQL_DSN}

      STATIC_DIR: public
      DEFAULT_CONFIG_PATH: ${DEFAULT_CONFIG_PATH}
      DEFAULT_AUTHOR: ${DEFAULT_AUTHOR}

      VMAGENT_CONFIG_PATH: ${VMAGENT_CONFIG_PATH}
      APPLY_MODE: ${APPLY_MODE}
      VMAGENT_RELOAD_URL: ${VMAGENT_RELOAD_URL}
      VMAGENT_PID: ${VMAGENT_PID}
      VMAGENT_RESTART_CMD: ${VMAGENT_RESTART_CMD}

    volumes:
      - ./config:${CONTAINER_CONFIG_DIR}:ro

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3099/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
