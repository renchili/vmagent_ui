global:
  scrape_interval: 15s
  scrape_timeout: 10s
scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          env: demo
  - job_name: demo-app
    static_configs:
      - targets:
          - demo.internal:8080
remote_write:
  - url: http://victoriametrics:8428/api/v1/write
